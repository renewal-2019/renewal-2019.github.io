<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>失效气缸环测绘步骤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="detail-page">
    <section class="detail-hero">
      <p class="detail-breadcrumb">密封件测绘 / 失效测绘 / 气缸环</p>
      <h1>失效气缸环测绘步骤</h1>
      <p class="detail-summary">用于失效气缸环的损伤模式记录、尺寸退化分析和失效原因整理。</p>
      <a class="back-link" href="./index.html">返回首页</a>
    </section>
    <section class="detail-layout">
      <aside class="detail-card">
        <h2>建议记录项</h2>
        <ul>
          <li>磨损、断裂、崩边和拉伤位置</li>
          <li>关键尺寸与原设计值的差异</li>
          <li>配合槽体和相邻件状态</li>
          <li>可能的工况异常信息</li>
        </ul>
      </aside>
      <div class="detail-steps">
        <h2>测绘步骤</h2>
        <article class="detail-step"><strong>1</strong><h3>失效拍照</h3><p>保留失效原貌，分别记录整体和局部损伤特征，建立对照编号。</p></article>
        <article class="detail-step"><strong>2</strong><h3>损伤描述</h3><p>标记裂纹、掉块、磨损带和高温变色区域，明确主失效位置。</p></article>
        <article class="detail-step"><strong>3</strong><h3>尺寸复测</h3><p>复测关键尺寸并与正常件或设计值比较，判断失效前后的变化量。</p></article>
        <article class="detail-step"><strong>4</strong><h3>结论整理</h3><p>在页面中沉淀失效现象、可能原因和建议复核点。</p></article>
      </div>
    </section>
  </main>
</body>
</html>
